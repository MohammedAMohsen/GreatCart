{% extends 'base.html' %}
{% load static %}
{% block content %}

	<section class="section-conten padding-y bg" style="min-height:53vh">
		<div class="container">
			<div class="row">
				{% include 'includes/dashboard_sidebar.html' %}
				<main class="col-md-9">
					<article class="card">
						<header class="card-header">
							<span><b>Happy Day: </b>{{user.full_name|capfirst}}</span>
						</header>
						<div class="card-body">
							<div class="row"> 
								<div class="col-md-6">
									<div class="card" style="text-align: center;">
										<div class="card-body">
											<h5 class="card-title">Total Orders</h5>
											<h4>{{ user.order_set.count }}</h4>
											<a href="#">View Orders</a>
										</div>
									</div>
								</div>
								<div class="col-md-6">
									<div class="card" style="text-align: center;">
										<div class="card-body">
											<img src="{{user.profile.profile_picture.url}}" alt="User Profile Picture"  class="img-sm icon rounded-circle">
											<p class="mb-0">{{ user.email }}</p>
											<p>{{ user.phone_number }}</p>
											<p></p>
										</div>
									</div>
								</div>
							</div> <!-- row.// -->
						</div> <!-- card-body .// -->
					</article> <!-- order-group.// --> 
				</main>
			</div> <!-- row.// -->
		</div>
	</section>
{% endblock content %}
