{% extends 'base.html' %}
{% load static %}
{% block content %}

<section class="section-conten padding-y mr-3 ml-3 t-4" style="min-height:55vh">
	<!-- ============================ COMPONENT LOGIN   ================================= -->

		<div class="card mx-auto" style="max-width: 480px; margin-top:50px">
			<div class="card-body">
				<h4 class="card-title mb-4">Forgot Password</h4>
				<form action="" method="POST">
					{% csrf_token %}
					<div class="form-group">
						<input type="email" class="form-control" placeholder="Email Address" name="email" required>
					</div> <!-- form-group// -->
					<div class="form-group">
						<a href="{% url 'login' %}" class="float-right">Got password? login</a>
					</div>
					<div class="form-group">
						<button type="submit" class="btn btn-primary btn-block"> Send Email  </button>
					</div> <!-- form-group// -->    
				</form>
			</div> <!-- card-body.// -->
		</div> <!-- card .// -->
		<p class="text-center mt-4">Don't have account? <a href="{% url 'register' %}">Sign up</a></p>
		<br><br>

	<!-- ============================ COMPONENT LOGIN  END.// ================================= -->
</section>

{% endblock content %}
