{% extends 'base.html' %}
{% load static %}
{% block content %}

<section class="section-conten padding-y mr-3 ml-3" style="min-height:55vh">
	<!-- ============================ COMPONENT LOGIN   ================================= -->
    <div class="card mx-auto" style="max-width: 380px;">
        <div class="card-body">
            <h4 class="card-title mb-4">Reset Password</h4>
            <form action="" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <input
                        class="form-control"
                        type="password"
                        name="new_password1"
                        placeholder="New Password"
                        required>
                </div> <!-- form-group// -->
                <div class="form-group">
                    {% if form.new_password2.errors %}
                        <input
                            class="form-control is-invalid"
                            type="password"
                            name="new_password2"
                            placeholder="Confirm Password"
                            required>
                        {% for error in form.new_password2.errors %}
                            <div class="invalid-feedback">{{ error }}</div>
                        {% endfor %}
                    {% else %}
                        <input
                            class="form-control"
                            type="password"
                            name="new_password2"
                            placeholder="Confirm Password"
                            required>
                    {% endif %}
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-block"> Reset  </button>
                </div> <!-- form-group// -->    
            </form>
        </div> <!-- card-body.// -->
    </div> <!-- card .// -->
	<!-- ============================ COMPONENT LOGIN  END.// ================================= -->
</section>

{% endblock content %}
