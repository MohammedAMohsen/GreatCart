{% load static %}
<style>
    .dropdown-menu-phone {
        left: -14rem;
    }
    @media screen and (max-width: 1199px) {
        .brand-wrap .logo, .navbar-brand .logo {
            max-height: 37px;
        }
    }
    @media (max-width: 991px) {
        .justify-content-md-end {
            padding-top: 15px;
            padding-right: 5px;
            justify-content: space-between !important;;
        }
    }
</style>
<header class="section-header">
    <nav class="navbar p-md-0 navbar-expand-sm navbar-light border-bottom">
    <div class="container">
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTop4" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarTop4">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle" data-toggle="dropdown">   Language </a>
                <ul class="dropdown-menu small">
                    <li><a class="dropdown-item" href="#">English</a></li>
                    <li><a class="dropdown-item" href="#">Arabic</a></li>
                    <li><a class="dropdown-item" href="#">Russian </a></li>
                </ul>
            </li>
            <li class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle" data-toggle="dropdown"> USD </a>
                <ul class="dropdown-menu small">
                    <li><a class="dropdown-item" href="#">EUR</a></li>
                    <li><a class="dropdown-item" href="#">AED</a></li>
                    <li><a class="dropdown-item" href="#">RUBL </a></li>
                </ul>
            </li>
        </ul>
        <ul class="navbar-nav">
            <li><a href="#" class="nav-link"> <i class="fa fa-envelope"></i> Email </a></li>
            <li><a href="#" class="nav-link"> <i class="fa fa-phone"></i> Call us </a></li>
        </ul> <!-- list-inline //  -->
    </div> <!-- navbar-collapse .// -->
    </div> <!-- container //  -->
    </nav>

    <section class="header-main border-bottom">
        <div class="container">
    <div class="row align-items-center" style="justify-content: space-between;">
        <div class="col-lg-2 col-md-3 col-6">
            <a href="{% url 'home' %}" class="brand-wrap">
				<img class="logo" src="{% static './images/logo.png' %}">
            </a> <!-- brand-wrap.// -->
        </div>
        <div class="col-lg col-sm col-md col-6 flex-grow-0">
            <div class="category-wrap dropdown d-inline-block float-right">
                <button type="button" class="btn btn-primary dropdown-toggle" data-toggle="dropdown"> 
                    <i class="fa fa-bars"></i> All category 
                </button>
                <div class="dropdown-menu dropdown-menu-phone">
                    <a class="dropdown-item" href="{% url 'store' %}"><b>All Products</b></a>
                    {% for category in links %}
                        <a class="dropdown-item" href="{% url 'product-by-category' category.slug %}">{{ category.category_name }}</a>
                    {% endfor %}
                </div>
            </div>  <!-- category-wrap.// -->
        </div> <!-- col.// -->
        <div class="col-lg  col-md-6 col-sm-12 col">
            <form action="{% url 'store' %}" method="GET" class="search">
                <div class="input-group w-100">
                    <a href="{% url 'store' %}" class="btn btn-outline-primary">Store</a>
                    <input type="text" name="q" class="form-control" style="width:60%; margin-left:10px; border-radius: 8px 0 0 8px;" placeholder="Search">
                    <div class="input-group-append">
                        <button class="btn btn-primary" type="submit">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
            </form> <!-- search-wrap .end// -->
        </div> <!-- col.// -->
        <div class="col-lg-3 col-sm-12 col-md-12 col-12">
            <div class="d-flex justify-content-md-end widgets-wrap">
                <a href="#" class="widget-header">
                    <div class="icontext">
                        <div class="icon icon-sm border rounded-circle">
                            <i class="fa  fa-user"></i>
                        </div>
                        <div class="text">
                            <small>Sign in | Join </small>
                            <div>My account </div>
                        </div>
                    </div>
                </a>
                <a href="{% url 'cart' %}" class="widget-header ml-4">
                    <div class="icon icon-sm border rounded-circle"><i class="fa fa-shopping-cart"></i></div>
                    <span class="badge badge-pill badge-danger notify">{{ items.count }}</span>
                </a>
            </div> <!-- widgets-wrap.// -->
        </div> <!-- col.// -->
    </div> <!-- row.// -->
        </div> <!-- container.// -->
    </section> <!-- header-main .// -->
